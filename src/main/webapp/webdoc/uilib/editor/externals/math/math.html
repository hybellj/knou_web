	<script id="MathJax-script" async src="tex-mml-chtml.js">
	<script type="text/x-mathjax-config">
		MathJax.Hub.Config({ tex2jax: {inlineMath: [['$','$'], ['\\(','\\)']]} });
	</script>
	<script type="text/javascript">
		var inputBox	= null;
		var previewBox	= null;
		var previewMath	= null;
		var equQueue 	= null;

		$(document).ready(function(){
			inputBox = document.getElementById("eqInputBox");
			previewBox = document.getElementById("eqPreviewBox");
			inputBox.focus();

			$(".eqIcon a").click(function(e) {
				var latex = $(this).attr("title");
				insertEqationText(" "+latex+" ");

				e.preventDefault();
				changeEquationValue();
			});

			$(".eqtab li a").click(function(e) {
				var tab = $(this).attr("href");

				if (tab.indexOf("#tab") == -1) {
					return;
				}

				$(".eqtab li").removeClass("on");
				$(".eqtab-content").hide();
				$(this).parent().addClass("on");
				$(tab).show();
			});

			$("#eqInputBox").keyup(function(e) {
				changeEquationValue();
		    });
		});


		// 키 입력시 이벤트 처리
		function changeEquationValue(event) {
			if (event) {
				var key = event.keyCode;

				if (key == 13 || key == 25 || key == 32 || event.keyCode == 220
						|| (key >= 16 && key <= 21)
						|| (key >= 33 && key <= 40)) {
					return;
				}
			}

			var value = inputBox.value.trim();
			previewBox.innerHTML = "";

			MathJax.texReset();
			var options = MathJax.getMetricsFor(previewBox);
			MathJax.tex2chtmlPromise(value, options).then(function (node) {
				previewBox.appendChild(node);
				MathJax.startup.document.clear();
				MathJax.startup.document.updateDocument();
			});
		}


		// 수식삽입
		function insertEqationText(txtValue) {
			var me = inputBox;
			if (document.selection) {
				me.focus();
				sel = document.selection.createRange();
				sel.text = txtValue;
				me.focus();
			} else if (me.selectionStart || me.selectionStart == '0') {
				var startPos = me.selectionStart, endPos = me.selectionEnd, scrollTop = me.scrollTop;
				me.value = me.value.substring(0, startPos) + txtValue + me.value.substring(endPos, me.value.length);
				me.focus();
				me.selectionStart = startPos + txtValue.length;
				me.selectionEnd = startPos + txtValue.length;
				me.scrollTop = scrollTop;
			} else {
				me.value += txtValue;
				me.focus();
			}
		}


		// 편집 종료
		function finishEquationEdit() {
			$("#insertBtn").attr('disabled', true);
			$("#loading").show();

			$.ajax({
	    		async : false,
	    		type: 'POST',
	    		url: "/math/mathToImage.do",
	    		data : {data : $("#eqInputBox").val()},
	    		dataType:"json",
	    		success : function(data) {
	    			if (data.imgSrc != "") {
	    				parent.postMessage("mathInput:"+data.imgSrc, "*");
	    			}
	    			else {
	    				$("#insertBtn").attr('disabled', false);
	    				$("#loading").hide();
	    				alert("Equation transformation error.");
	    			}
	    		},
	    		error : function() {
	    			$("#insertBtn").attr('disabled', false);
	    			$("#loading").hide();
	    			alert("Equation transformation error.222");
	    		}
	    	});
		}

		// 수식편집창 닫기
		function closeEditor() {
			parent.postMessage("closeMath", "*");
		}
	</script>
