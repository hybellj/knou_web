<?xml version="1.0" encoding="utf-8" standalone="no" ?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg
	xmlns="http://www.w3.org/2000/svg"
	xmlns:xlink="http://www.w3.org/1999/xlink"
	version="1.1"
	id="UIC-DEXTUPLOADX5-PROGRESSIVE"
	onload="onLoadHandler()" width="100%" height="100%">
    <script type="application/ecmascript" xlink:href="../module/dextuploadx5-common.js"/>
    <script type="application/ecmascript" xlink:href="./dextuploadx5-up-3-app.js"/>
    <style type="text/css">
        * { font-family: 'Malgun Gothic', AppleGothic, Arial, 'sans-serif'; }
        .css-txt-title { font-size: 10pt; fill: #333; font-weight: bold; }
        .css-txt-progressive { font-size: 8pt; fill: #354a60; }
        .css-txt-filename { font-size: 8pt; fill: #ebebeb; }
        .css-btn { cursor: pointer; }
        .css-btn:hover .btn-back { fill: #99DC11; }
    </style>
    <defs>
        <symbol id="UIS-CANCEL" viewBox="0 0 16 16">
            <rect x="0" y="0" width="100%" height="100%"/>
            <path d="M0,3 l3,-3 l5,5 l5,-5 l3,3 l-5,5 l5,5 l-3,3 l-5,-5 l-5,5 l-3,-3 l5,-5 z" stroke="none" fill="#465b70"/>
        </symbol>
    </defs>
    <svg id="UIC-MAIN-AREA" x="0" y="0" width="100%" height="100%">
        <svg x="0" y="0" width="100%" height="40">
            <rect x="0" y="0" width="100%" height="100%" stroke="none" fill="#ebebeb"/>
            <text id="UIC-TITLE-TXT" x="10" y="26" class="css-txt-title">UPLOADING</text>
            <use id="UIC-TITLE-BTN-CANCEL" xlink:href="#UIS-CANCEL" y="15" width="12" height="12" layout-dx5="x:100%-22px;" style="cursor:pointer;" fill="#ebebeb"/>
        </svg>
        <svg x="0" y="40" width="100%" height="100">
            <rect x="0" y="0" width="100%" height="100%" stroke="none" fill="#465b70"/>
            <svg x="20" y="10" height="34" layout-dx5="width:100%-40px;">
                <rect x="0" y="0" width="100%" height="100%" stroke="none" fill="#607D8B"/>
                <rect id="UIC-PROGRESS-BAR-RATE" x="0" y="0" width="0%" height="100%" stroke="none" fill="#99DC11"/>
                <g id="UIC-PROGRESS-INFO" style="display:block;">
                    <text x="10" y="21" class="css-txt-progressive">
                        <tspan id="UIC-TXT-TOTAL-SEND">MB</tspan> / <tspan id="UIC-TXT-TOTAL-SIZE">MB</tspan> ( <tspan id="UIC-TXT-TOTAL-PERCENTAGE">0</tspan>% )
                    </text>
                    <text y="21" text-anchor="end" layout-dx5="x:100%-10px;" class="css-txt-progressive">
                        <tspan id="UIC-TXT-TOTAL-RTIME">00:00:00</tspan>
                        ( <tspan id="UIC-TXT-TOTAL-SPEED">3.75</tspan> )
                    </text>
                </g>
                <g id="UIC-WAIT-INFO" style="display:none;">
                    <text id="UIC-TXT-WAIT" x="50%" y="21" text-anchor="middle" class="css-txt-progressive">Waiting server response...</text>
                </g>
            </svg>
            <svg x="20" y="44" height="3" layout-dx5="width:100%-40px;">
                <rect id="UIC-PROGRESS-BAR-HASH" style="display:none;" x="0" y="0" width="30%" height="100%" stroke="none" fill="#C2EA70" />
            </svg>
            <!-- current file --><svg x="20" y="47" height="20" layout-dx5="width:100%-40px;" class="css-txt-filename">
                <title id="UIC-AT-FILENAME">File Name.txt</title>
                <text id="UIC-TXT-FILENAME" x="0" y="12">File Name.txt</text>
            </svg>
            <!-- button area --><svg x="0" y="67" width="100%" layout-dx5="height:100%-67px">
                <svg id="UIC-BTN-ABORT" viewBox="0 0 64 24" class="css-btn" y="0" width="64" height="24" layout-dx5="x:50%-66px" style="visibility:visible">
                    <rect class="btn-back" x="0" y="0" rx="3" ry="3" width="100%" height="100%" fill="#354a60"/>
                    <text class="btn-text" x="50%" y="17" text-anchor="middle" font-size="12px" fill="#fff" style="user-select:none;">Abort</text>
                </svg>
                <svg id="UIC-BTN-RETRY" viewBox="0 0 64 24" class="css-btn" y="0" width="64" height="24" layout-dx5="x:50%-66px" style="visibility:hidden">
                    <rect class="btn-back" x="0" y="0" rx="3" ry="3" width="100%" height="100%" fill="#354a60"/>
                    <text class="btn-text" x="50%" y="17" text-anchor="middle" font-size="12px" fill="#fff" style="user-select:none;">Retry</text>
                </svg>
                <svg id="UIC-BTN-CANCEL" viewBox="0 0 64 24" class="css-btn" y="0" width="64" height="24" layout-dx5="x:50%+2px">
                    <rect class="btn-back" x="0" y="0" rx="3" ry="3" width="100%" height="100%" fill="#354a60"/>
                    <text class="btn-text" x="50%" y="17" text-anchor="middle" font-size="12px" fill="#fff" style="user-select:none;">Cancel</text>
                </svg>
            </svg>
        </svg>
    </svg>
</svg>
