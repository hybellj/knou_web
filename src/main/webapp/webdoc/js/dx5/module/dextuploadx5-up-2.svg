<?xml version="1.0" encoding="utf-8" standalone="no" ?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg
	xmlns="http://www.w3.org/2000/svg"
	xmlns:xlink="http://www.w3.org/1999/xlink"
	version="1.1"
	id="UIC-DEXTUPLOADX5-PROGRESSIVE"
	onload="onLoadHandler(evt)" width="100%" height="100%">
    <script type="application/ecmascript" xlink:href="../module/dextuploadx5-common.js"/>
    <script type="application/ecmascript" xlink:href="./dextuploadx5-up-2-app.js"/>
    <style type="text/css">
        * { font-family: 'Malgun Gothic', AppleGothic, Arial, 'sans-serif'; }
        .css-txt-title { font-size: 10pt; fill: #fff; font-weight: bold; }
        .css-txt-filename { font-size: 9pt; fill: #6b6b6b; }
        .css-txt-size,
        .css-txt-speed { font-size: 24pt; fill: #edeff0; font-weight: bold; }
        .css-txt-tot-time-send,
        .css-txt-cur-speed-value { font-size: 10pt; fill: #224357; font-weight: bold; }
        .css-txt-tot-time-remain,
        .css-txt-cur-speed-unit { font-size: 10pt; fill: #959595; font-weight: bold; }
        .css-txt-total-time { font-size: 8.5pt; fill: #6b6b6b; }
        .css-txt-count { font-size: 8.5pt; fill: #fff; }
        .css-txt-progressive { font-size: 9pt; fill: #fff; }
        .css-btn { cursor: pointer; }
        .css-btn:hover .btn-back { fill: #03A9F4; }
        #UIC-PROGRESSIVE-TOT-GAUGE,
        #UIC-PROGRESSIVE-CUR-GAUGE,
        #UIC-PROGRESSIVE-HAS-GAUGE,
        #UIC-PROGRESSIVE-SPEED-GAUGE {
            transition: stroke-dashoffset .5s ease-out;        
        }
        #UIC-PROGRESSIVE-GROUP {
            transform-origin: 133px 144px;
            transform: rotate(-180deg);
        }
        #UIC-SPEED-ARROW {
            transition: transform .5s ease-out;
        }
    </style>
    <defs>
        <symbol id="UIS-CANCEL" viewBox="0 0 16 16">
            <path d="M0,3 l3,-3 l5,5 l5,-5 l3,3 l-5,5 l5,5 l-3,3 l-5,-5 l-5,5 l-3,-3 l5,-5 z" stroke="none" fill="white"/>
        </symbol>
        <symbol id="UIS-BIG-ARROW" viewBox="0 0 100 21">
            <path stroke="none" fill="#506470" d="M0,10 l90,-5 v11 z"/>
            <circle cx="90" cy="10" r="10" stroke="none" fill="#506470"/>
            <circle cx="90" cy="10" r="5" stroke="none" fill="#fff"/>
        </symbol>
        <symbol id="UIS-SMALL-ARROW" viewBox="0 0 80 21">
            <path stroke="none" fill="#cccccc" d="M0,10 l70,-5 v11 z"/>
            <circle cx="70" cy="10" r="10" stroke="none" fill="#506470"/>
            <circle cx="70" cy="10" r="5" stroke="none" fill="#fff"/>
        </symbol>
    </defs>
    <svg id="UIC-MAIN-AREA" x="0" y="0" width="100%" height="100%">
        <svg x="0" y="0" width="100%" height="40">
            <rect x="0" y="0" width="100%" height="100%" stroke="none" fill="#465b70"/>
            <text id="UIC-TITLE-TXT" x="10" y="26" class="css-txt-title">UPLOADING</text>
            <use id="UIC-TITLE-BTN-CANCEL" xlink:href="#UIS-CANCEL" x="240" y="15" width="12" height="12" style="cursor:pointer;"/>
        </svg>
        <svg id="UIC-BODY" x="0" y="40" width="100%" height="234">
            <rect x="0" y="0" width="100%" height="100%" stroke="none" fill="#f7f7f7"/>
            <!-- 가운데 x:133 -->
            <!-- text count -->
            <rect x="93" y="20" width="80" height="20" fill="#465b70" stroke="none"/>
            <text id="UIC-TXT-COUNT-VALUE" x="133" y="34" class="css-txt-count" text-anchor="middle">9999 / 9999</text>
            <!-- total size -->
            <!--<g id="UIC-PROGRESSIVE-GROUP" transform="rotate(-180, 133, 144)"> IE에서는 transform 특성을 사용할 수 없다. -->
            <g id="UIC-PROGRESSIVE-GROUP">
                <circle id="UIC-PROGRESSIVE-TOT-GAUGE" cx="133" cy="144" r="85" stroke="#1fb3ff" stroke-width="10" stroke-linecap="butt" fill="none"/>
                <circle id="UIC-PROGRESSIVE-CUR-GAUGE" cx="133" cy="144" r="75" stroke="#ff9b2f" stroke-width="10" stroke-linecap="butt" fill="none"/>
                <circle id="UIC-PROGRESSIVE-HAS-GAUGE" cx="133" cy="144" r="65" stroke="#FFEA00" stroke-width="10" stroke-linecap="butt" fill="none"/>
                <circle id="UIC-PROGRESSIVE-SPEED-GAUGE" cx="133" cy="144" r="55" stroke="#8dc63f" stroke-width="10" stroke-linecap="butt" fill="none"/>
            </g>
            <script type="text/ecmascript"><![CDATA[
                var pl = svgh.getAsUnit("UIC-BODY"), x = 0, y = 0;
                for (var i = 0; i <= 180; i += 2) {
                    if (i % 10 == 0) {
                        y = 144 - (Math.sin(getRadians(i)) * 60);
                        x = 133 - (Math.cos(getRadians(i)) * 60);
                    } else {
                        y = 144 - (Math.sin(getRadians(i)) * 53);
                        x = 133 - (Math.cos(getRadians(i)) * 53);	
                    }						
                    pl.append(svgh.createUnit("line").attp({ x1: 133, y1: 144, x2: x, y2: y, stroke: "#fff" }));
                }
            ]]></script>
            <path stroke="none" fill="#ffffff" d="M83,144 a50,50 0 0,1 100,0 z"/>
            <!-- 원의 아랫 부분을 가리기 위한 부분 -->
            <path stroke="none" fill="#f7f7f7" d="M224,144 a91,91 0 0,1 -182,0 z"/>
            <!-- speed(current) -->
            <use id="UIC-SPEED-ARROW" xlink:href="#UIS-SMALL-ARROW" x="133" y="134" width="50" height="21" transform="rotate(0, 133, 144), translate(-45, 0)"/>
            <text id="UIC-TXT-CURRENT-SPEED-VALUE" x="130" y="125" text-anchor="end" class="css-txt-cur-speed-value">0</text>
            <text id="UIC-TXT-CURRENT-SPEED-UNIT" x="136" y="125" text-anchor="start" class="css-txt-cur-speed-unit" >B/s</text>
            <!-- total time -->
            <text id="UIC-TXT-TOTAL-TIME-SEND" x="130" y="178" text-anchor="end" class="css-txt-tot-time-send">00:00:00</text>
            <text id="UIC-TXT-TOTAL-TIME-REMAIN" x="136" y="178" text-anchor="start" class="css-txt-tot-time-remain" >(00:00:40)</text>
            <!-- button area --><svg x="0" y="195" width="100%" height="24">
                <svg id="UIC-BTN-ABORT" viewBox="0 0 64 24" class="css-btn" y="0" width="64" height="24" layout-dx5="x:50%-66px" style="visibility:visible">
                    <rect class="btn-back" x="0" y="0" rx="3" ry="3" width="100%" height="100%" fill="#465b70"/>
                    <text class="btn-text" x="50%" y="17" text-anchor="middle" font-size="12px" fill="#fff" style="user-select:none;">Abort</text>
                </svg>
                <svg id="UIC-BTN-RETRY" viewBox="0 0 64 24" class="css-btn" y="0" width="64" height="24" layout-dx5="x:50%-66px" style="visibility:hidden">
                    <rect class="btn-back" x="0" y="0" rx="3" ry="3" width="100%" height="100%" fill="#465b70"/>
                    <text class="btn-text" x="50%" y="17" text-anchor="middle" font-size="12px" fill="#fff" style="user-select:none;">Abort</text>
                </svg>
                <svg id="UIC-BTN-CANCEL" viewBox="0 0 64 24" class="css-btn" y="0" width="64" height="24" layout-dx5="x:50%+2px">
                    <rect class="btn-back" x="0" y="0" rx="3" ry="3" width="100%" height="100%" fill="#465b70"/>
                    <text class="btn-text" x="50%" y="17" text-anchor="middle" font-size="12px" fill="#fff" style="user-select:none;">Cancel</text>
                </svg>
            </svg>
        </svg>
        <svg x="0" y="274" height="26" width="100%" >
            <rect x="0" y="0" width="100%" height="100%" stroke="none" fill="#ebebeb"/>
            <svg x="10" y="0" height="100%" layout-dx5="width:100%-20px">
                <title id="UIC-AT-FILENAME"></title>
                <text id="UIC-TXT-FILENAME" class="css-txt-filename" x="0" y="17">File Name</text>
                <text id="UIC-TXT-WAIT" x="0" y="17" class="css-txt-progressive">Waiting server response...</text>
            </svg>
        </svg>
    </svg>
</svg>
