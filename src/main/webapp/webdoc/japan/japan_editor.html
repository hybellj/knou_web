<script language="javascript">
var parentContext;
    // 페이지 로딩후
    $(document).ready(function () {
        $("#japanInput").focus();                                                   // 커서를 셋팅하지 않으면 입력값 셋팅시 커서는 맨앞으므로 포커스셋팅.
        //$("#japanInput").val(parent.eq_argument);                                   // 부모창의 입력된 입력값을 셋팅. 커서 마지막으로.
    });

    function setInputText(text){
        $("#japanInput").val(text);
    }
    function setParentContext(context){
        parentContext = context;
    }
    
    function getJapanInputText(){
        return $("#japanInput").val();
    }
    
    function japan(num) {
        for (var z=1; z<=2; z++){
            obj = $("#japanCont"+ z);
            if (z == num){
                obj.css("display", "");
            } else {
                obj.css("display", "none");
            }
        }
        return;
    }

    function mmover(obj, gubun) {
        if(gubun=='over') obj.src = obj.src.replace(".gif","on.gif");
        else obj.src = obj.src.replace("on.gif",".gif");
    }
    // 일본어 입력 // text, textarea 상자의 커서위치 파악 커서 위치에 텍스트를 입력
    // 익스, 파폭, 크롬, 사파리 정상작동.
    // 오페라는 영역지정후 치환안되고 해당영역 앞쪽으로 문자입력
    // 오페라 해결방법은 input아 아닌 textarea로 하면 영역정보를 정상적으로 반환받아 치환되어 들어간다.
    // input으로 할경우는 a태그가 아닌 input botton으로 펑션을 호출하면 영역정보를 반환받을수 있다.
    function Fn_JpIn(txt){

        var obj = document.getElementById("japanInput");
        var postfix = txt;
        var prefix = "";
        var caretPos = "";
        var s1;
        var s2;
        var s3;
        var selStart;
        var selEnd;

        if (document.getSelection)    ts = document.getSelection();
        else if (document.selection)  ts = document.selection.createRange().text;
        else if (window.getSelection) ts = window.getSelection();

        if (ts != ""){                                                                  //IE
            document.selection.createRange().text = prefix + ts + postfix;
        }else {
            if (obj.selectionStart == obj.selectionEnd){                                // 커서를 가져놓음
                if(/*@cc_on!@*/false){                                                  // 익스
                    obj.focus();
                    caretPos = document.selection.createRange().duplicate();
                    caretPos.text = prefix + caretPos.text + postfix;
                    document.selection.createRange().select();
                }else{                                                                  // 다른브라우저
                    s1 = obj.value.substring(0, obj.selectionStart);                    // 커서위치 앞글자
                    s2 = obj.value.substring(obj.selectionStart);                       // 커서위치 뒷글자
                    selStart = obj.selectionStart;                                      // 커서 시작위치값 저장.

                    $(obj).val(s1 + prefix + postfix + s2);                             // 앞글자 + 입력글자 + 뒷글자

                    // value를 셋팅하면 커서가 제일뒤로 이동하므로 다시 문자입력한 다음자리로 커서를 이동시켜준다.
                    fn_setCursorPosition(obj, selStart+1);                              // 영역지정 문자 변경후 커서위치 셋팅(
                }
            }else{                                                                      // 영역지정
                if(/*@cc_on!@*/false){                                                  // 익스
                    obj.focus();
                    caretPos = document.selection.createRange().duplicate();
                    caretPos.text = prefix + caretPos.text.charAt(caretPos.text.length - 1) == prefix ? postfix + prefix : postfix;
                    document.selection.createRange().select();                          // 치환된문자로 영역지정.
                    fn_setCursorPosition(obj, obj.selectionStart+1);                    // 영역지정 문자 변경후 커서위치 다음칸으로 셋팅
                }else{                                                                  // 다른브라우저
                    s1 = obj.value.substring(0, obj.selectionStart);                    // 영역지정 시작위치까지의 글자
                    s2 = obj.value.substring(obj.selectionStart, obj.selectionEnd);     // 영역지정 시작위치부터 마지막위치까지의 글자
                    s3 = obj.value.substring(obj.selectionEnd);                         // 영역지정 마지막위치부터 마지막글자까지
                    selStart = obj.selectionStart;                                      // 커서 시작위치값 저장.

                    $(obj).val(s1 + prefix + postfix + s3);                             // 시작위치까지의글자 + 입력글자 + 영역끝부터마자믹까지글자
                    fn_setCursorPosition(obj, selStart+1);                              // 영역지정 문자 변경후 커서위치 다음칸으로 셋팅
                }
            }
        }
    }

    // 커서위치이동
    function fn_setCursorPosition(obj,pos){
        if ($(obj).get(0).setSelectionRange) {
            $(obj).get(0).setSelectionRange(pos, pos);
        } else if ($(obj).get(0).createTextRange) {
            var range = $(obj).get(0).createTextRange();
            range.collapse(true);
            range.moveEnd('character', pos);
            range.moveStart('character', pos);
            range.select();
        }
        obj.focus();
    }
    // 일본어 입력 // text, textarea 상자의 커서위치 파악 커서 위치에 텍스트를 입력

        var inputVal = $("#japanInput").val();
        parent.postMessage("editorJapanInput:"+inputVal, "*");
    }
    
	// 일본어 입력창 닫기
	function closeEditor() {
		parent.postMessage("closeEditorJapanInput", "*");
	}
</script>
